[settings]
# Avoid compiling Python from source; use precompiled builds
python.compile = false

[tools]
# Languages / runtimes
bun = "latest"
cue = "latest"
go = "latest"
node = "latest"
python = "latest"
ruff = "latest"
tree-sitter = "latest"
uv = "latest"
zig = "latest"

# Editors
neovim = "latest"

# Shell / CLI tools
"github:veirt/weathr" = "latest"
atuin = "latest"
bat = "latest"
carapace = "latest"
direnv = "latest"
eza = "latest"
fastfetch = "latest"
fd = "latest"
fzf = "latest"
jq = "latest"
just = "latest"
oh-my-posh = "latest"
ripgrep = "latest"
yq = "latest"
zoxide = "latest"

# Git / GitHub
"github:googleworkspace/cli" = { version = "latest", exe = "gws" }
gh = "latest"
lazygit = "latest"

# Kubernetes / cloud / containers
"aqua:docker/cli" = "latest"
apko = "latest"
cloudflared = "latest"
cloud-sql-proxy = "2"
dive = "latest"
k9s = "latest"
kubectx = "latest"
kubectl = "latest"
kubens = "latest"

# LSPs
"github:bergercookie/asm-lsp" = "latest"
"aqua:grafana/jsonnet-language-server" = "latest"
"aqua:hashicorp/terraform-ls" = "latest"
"aqua:LuaLS/lua-language-server" = "latest"
"aqua:tamasfe/taplo" = "latest"
"aqua:zigtools/zls" = "latest"
"github:withered-magic/starpls" = { version = "latest", exe = "starpls" }
"go:golang.org/x/tools/gopls" = "latest"
"npm:@vtsls/language-server" = "latest"
"npm:bash-language-server" = "latest"
"npm:vscode-langservers-extracted" = "latest"
"npm:yaml-language-server" = "latest"
"pipx:pyrefly" = "latest"

# Formatters / linters / debuggers
"aqua:bazelbuild/buildtools/buildifier" = "latest"
"go:github.com/go-delve/delve/cmd/dlv" = "latest"
"aqua:golangci/golangci-lint" = "latest"
"aqua:hadolint/hadolint" = "latest"
"aqua:JohnnyMorganz/StyLua" = "latest"
"aqua:koalaman/shellcheck" = "latest"
"aqua:terraform-linters/tflint" = "latest"
"github:DonIsaac/zlint" = "latest"
"npm:eslint_d" = "latest"
"npm:prettier" = "latest"
prek = "latest"
semgrep = "latest"

# Other
"github:max-sixty/worktrunk" = { version = "latest", exe = "wt" }
"npm:@colbymchenry/codegraph" = "latest"
"npm:@earendil-works/pi-coding-agent" = "latest"
yt-dlp = { version = "latest", rename_exe = "yt-dlp" }
ffmpeg = "latest"
herdr = "latest"
